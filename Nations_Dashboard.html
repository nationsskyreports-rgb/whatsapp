<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nations of Sky - Scripts Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a2a3a; --secondary: #27ae60; --accent: #3498db; --danger: #e74c3c; --warning: #f39c12; }
        * { box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
        .header { background: var(--primary); color: white; padding: 15px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header h1 { margin: 0; font-size: 22px; }
        .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
        .badge-live { background: var(--secondary); color: white; }
        .badge-saving { background: var(--warning); color: white; }
        .badge-error { background: var(--danger); color: white; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px 100px; }
        .add-main-btn { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--secondary); color: white; border: none; border-radius: 50%; font-size: 35px; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.3); z-index: 1001; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .add-main-btn:hover { transform: scale(1.1); background: #219150; }
        .add-main-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .overlay.active { display: flex; }
        .modal { background: white; width: 90%; max-width: 600px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideDown 0.3s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes slideDown { from { transform: translateY(-40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { border-bottom: 2px solid var(--secondary); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .close-modal { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        label { font-weight: bold; font-size: 14px; display: block; margin-top: 15px; margin-bottom: 5px; color: var(--primary); }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; font-size: 14px; }
        .save-btn { width: 100%; padding: 14px; background: var(--secondary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 25px; font-size: 16px; font-family: 'Cairo'; }
        .save-btn:disabled { background: #aaa; cursor: not-allowed; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 22px; border: 2px solid var(--primary); background: white; cursor: pointer; border-radius: 30px; font-weight: bold; color: var(--primary); font-family: 'Cairo'; }
        .tab-btn.active { background: var(--primary); color: white; }
        .msg-row { display: grid; grid-template-columns: 1fr 1fr 110px; gap: 20px; background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); border-right: 6px solid var(--accent); transition: 0.2s; }
        .msg-row:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .en-card { text-align: left; direction: ltr; border-left: 1px solid #eee; padding-left: 20px; }
        .msg-text { font-size: 14.5px; line-height: 1.7; color: #333; margin: 0 0 12px 0; }
        .cat-info { font-size: 11px; background: #f0f2f5; padding: 3px 10px; border-radius: 5px; color: #555; font-weight: bold; display: inline-block; margin-bottom: 8px; }
        .copy-btn { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 12px; background: #fff; font-weight: bold; font-family: 'Cairo'; }
        .copy-btn.copied { background: var(--secondary); color: white; border-color: var(--secondary); }
        .actions { display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        .action-btn { padding: 7px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; color: white; font-family: 'Cairo'; }
        .edit-btn { background: var(--warning); }
        .del-btn { background: var(--danger); }
        .state-msg { text-align: center; padding: 60px; color: #aaa; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Nations of Sky | Scripts Dashboard 🚀</h1>
    <span class="badge badge-live" id="status-badge">جاري التحميل...</span>
</div>

<button class="add-main-btn" id="fab-btn" onclick="openModal()">+</button>

<div class="overlay" id="msgModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="form-title" style="margin:0">إضافة سكربت جديد</h3>
            <button class="close-modal" onclick="closeModal()">✕</button>
        </div>
        <input type="hidden" id="edit-key">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div>
                <label>القسم</label>
                <input type="text" id="msg-category" list="cats-list" placeholder="اختر أو اكتب قسماً...">
                <datalist id="cats-list"></datalist>
            </div>
            <div>
                <label>العنوان</label>
                <input type="text" id="msg-title" placeholder="مثلاً: رد ترحيبي">
            </div>
        </div>
        <label>النص العربي</label>
        <textarea id="msg-ar" rows="4" placeholder="اكتب النص العربي هنا..."></textarea>
        <label>English Text</label>
        <textarea id="msg-en" rows="4" style="direction:ltr;text-align:left" placeholder="Write English text here..."></textarea>
        <button class="save-btn" id="save-btn" onclick="saveMessage()">حفظ السكربت 💾</button>
    </div>
</div>

<div class="container">
    <div id="main-content">
        <div class="state-msg">⏳ جاري التحميل...</div>
    </div>
</div>

<script>
    const BIN_ID = '69cecabb36566621a87394e5';
    const API_KEY = '$2a$10$5RayLd4ZEkNnk8sFm/WE9uvkmV5xBlRBbml7QGHa5EljbqKFZ3Gle';
    const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const HEADERS = { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY };

    let messages = {};
    let currentFilter = 'all';

    function setStatus(text, type = 'live') {
        const b = document.getElementById('status-badge');
        b.textContent = text;
        b.className = `badge badge-${type}`;
    }

    async function load() {
        try {
            const res = await fetch(URL + '/latest', { headers: HEADERS });
            if (!res.ok) throw new Error(res.status);
            const data = await res.json();
            messages = data.record.scripts || {};
            setStatus('✅ مشترك', 'live');
        } catch(e) {
            setStatus('❌ خطأ في التحميل', 'error');
        }
    }

    async function save() {
        setStatus('💾 جاري الحفظ...', 'saving');
        setBusy(true);
        try {
            const res = await fetch(URL, {
                method: 'PUT',
                headers: HEADERS,
                body: JSON.stringify({ scripts: messages })
            });
            if (!res.ok) throw new Error(res.status);
            setStatus('✅ مشترك', 'live');
            return true;
        } catch(e) {
            setStatus('❌ فشل الحفظ', 'error');
            return false;
        } finally {
            setBusy(false);
        }
    }

    function setBusy(busy) {
        document.getElementById('fab-btn').disabled = busy;
        const btn = document.getElementById('save-btn');
        btn.disabled = busy;
        btn.textContent = busy ? 'جاري الحفظ...' : 'حفظ السكربت 💾';
    }

    function openModal() { document.getElementById('msgModal').classList.add('active'); }
    function closeModal() { document.getElementById('msgModal').classList.remove('active'); resetForm(); }

    async function saveMessage() {
        const ar = document.getElementById('msg-ar').value.trim();
        const en = document.getElementById('msg-en').value.trim();
        const cat = document.getElementById('msg-category').value.trim() || 'عام';
        const title = document.getElementById('msg-title').value.trim() || 'بدون عنوان';
        const editKey = document.getElementById('edit-key').value;
        if (!ar || !en) return alert('يرجى إكمال النصوص');
        const key = editKey || 'msg_' + Date.now();
        messages[key] = { category: cat, title, ar, en };
        const ok = await save();
        if (ok) { closeModal(); render(); }
    }

    function render(filter) {
        if (filter !== undefined) currentFilter = filter;
        const allEntries = Object.entries(messages);
        const cats = [...new Set(allEntries.map(([, m]) => m.category))];
        document.getElementById('cats-list').innerHTML = cats.map(c => `<option value="${c}">`).join('');

        const tabsHtml = [
            `<button class="tab-btn ${currentFilter==='all'?'active':''}" onclick="render('all')">الكل (${allEntries.length})</button>`,
            ...cats.map(c => {
                const cnt = allEntries.filter(([,m]) => m.category === c).length;
                return `<button class="tab-btn ${currentFilter===c?'active':''}" onclick="render('${c}')">${c} (${cnt})</button>`;
            })
        ].join('');

        const filtered = currentFilter === 'all' ? allEntries : allEntries.filter(([,m]) => m.category === currentFilter);

        const listHtml = filtered.length === 0
            ? `<div class="state-msg">📭 لا توجد سكربتات، اضغط + لإضافة أول سكربت</div>`
            : filtered.map(([key, msg]) => `
                <div class="msg-row">
                    <div>
                        <span class="cat-info">${esc(msg.category)} | ${esc(msg.title)}</span>
                        <p class="msg-text" id="ar-${key}">${esc(msg.ar)}</p>
                        <button class="copy-btn" onclick="copyText('ar-${key}', this)">نسخ العربي</button>
                    </div>
                    <div class="en-card">
                        <span class="cat-info">English Version</span>
                        <p class="msg-text" id="en-${key}">${esc(msg.en)}</p>
                        <button class="copy-btn" onclick="copyText('en-${key}', this)">Copy English</button>
                    </div>
                    <div class="actions">
                        <button class="action-btn edit-btn" onclick="editMsg('${key}')">✏️ تعديل</button>
                        <button class="action-btn del-btn" onclick="deleteMsg('${key}')">🗑️ حذف</button>
                    </div>
                </div>`).join('');

        document.getElementById('main-content').innerHTML = `<div class="tabs">${tabsHtml}</div>${listHtml}`;
    }

    function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function copyText(id, btn) {
        navigator.clipboard.writeText(document.getElementById(id)?.innerText || '');
        const old = btn.innerText;
        btn.innerText = 'Copied! ✅'; btn.classList.add('copied');
        setTimeout(() => { btn.innerText = old; btn.classList.remove('copied'); }, 1200);
    }

    function editMsg(key) {
        const m = messages[key]; if (!m) return;
        document.getElementById('msg-ar').value = m.ar;
        document.getElementById('msg-en').value = m.en;
        document.getElementById('msg-category').value = m.category;
        document.getElementById('msg-title').value = m.title;
        document.getElementById('edit-key').value = key;
        document.getElementById('form-title').innerText = 'تعديل السكربت';
        openModal();
    }

    async function deleteMsg(key) {
        if (!confirm('هل تريد حذف هذا السكربت؟')) return;
        delete messages[key];
        const ok = await save();
        if (ok) render();
    }

    function resetForm() {
        ['msg-ar','msg-en','msg-category','msg-title','edit-key'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('form-title').innerText = 'إضافة سكربت جديد';
    }

    document.getElementById('msgModal').addEventListener('click', function(e) { if (e.target===this) closeModal(); });

    load().then(render);
    setInterval(() => load().then(render), 30000);
</script>
</body>
</html>
